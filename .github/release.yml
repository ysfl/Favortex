changelog:
  categories:
    - title: "Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "Performance"
      labels:
        - "performance"
    - title: "Packaging & Build"
      labels:
        - "build"
        - "release"
        - "infra"
        - "ci"
    - title: "Docs"
      labels:
        - "documentation"
        - "docs"
    - title: "Maintenance"
      labels:
        - "chore"
        - "refactor"
        - "deps"
  exclude:
    labels:
      - "skip-changelog"
